<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Horarios{% block title %}{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v=2.1">
    {% block head %}{% endblock %}
</head>
<body>
    {% block body %}{% endblock %}
    {% block scripts %}{% endblock %}

    <!-- ═══ FIRMA: último hijo de body, fuera de todo ═══ -->
    <footer class="harry-footer">
        <img src="{{ url_for('static', filename='img/harry.png') }}"
             alt="Harry" class="harry-footer-img">
        <span class="harry-footer-text">by Harry</span>
    </footer>
</body>
</html>
