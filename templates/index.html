<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Horarios — Inicio</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="static/css/style.css">

  <!-- SheetJS: equivale a openpyxl, lee el Excel en el navegador -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="page-index">

  <!-- ═══ HEADER ═══ -->
  <div class="idx-header">
    <div class="idx-logo">
      <img src="static/img/512x512.png" alt="Logo" class="logo-app-img">
      <div>
        <div class="logo-title">Generador de Horarios</div>
        <div class="logo-sub">Planifica tu horario</div>
      </div>
    </div>
  </div>

  <!-- ═══ BODY ═══ -->
  <div class="idx-body">

    <!-- ── CARD 1: SUBIR CARGA HORARIA ── -->
    <div class="idx-card">
      <div class="card-title">📁 Subir carga horaria</div>
      <div class="card-desc">Sube el archivo .xlsx con los horarios disponibles</div>

      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".xlsx,.xls">
        <div class="upload-icon">📄</div>
        <div class="upload-label">
          <strong>Click para seleccionar archivo</strong>
          Formatos: .xlsx, .xls
        </div>
      </div>

      <div id="fileInfo" class="file-badge" style="display:none"></div>

      <button id="btnUpload" class="btn-primary" disabled>
        Cargar archivo
      </button>

      <div id="uploadStatus" class="upload-status"></div>
    </div>

    <!-- ── CARD 2: SELECCIONAR CURSOS ── -->
    <!-- Empieza oculta, JS la muestra después de cargar el Excel -->
    <div class="idx-card" id="cardCursos" style="display:none">
      <div class="card-title">📚 Seleccionar cursos</div>
      <div class="card-desc">Busca y elige los cursos que deseas incluir</div>

      <div class="search-wrap">
        <input type="text" id="courseSearch" class="search-input"
               placeholder="Buscar curso por nombre...">
        <button id="clearSearch" class="clear-search-btn">✕</button>
      </div>

      <!-- JS llenará esta lista con los cursos del Excel -->
      <div class="cursos-lista" id="cursosLista"></div>

      <div class="seleccionados-wrap">
        <div class="sel-header">
          <span class="sel-label">Seleccionados</span>
          <span class="sel-count" id="selCount">0</span>
        </div>
        <button id="btnNext" class="btn-primary btn-next" disabled>
          Generar horarios →
        </button>
      </div>
    </div>

  </div>
</div>

<!-- ═══ FIRMA ═══ -->
<footer class="harry-footer">
  <img src="static/img/harry.png" alt="Harry" class="harry-footer-img">
  <span class="harry-footer-text">by Harry</span>
</footer>

<!-- ── Scripts ── -->
<!-- parser.js debe cargarse antes que este script -->
<script src="static/js/parser.js"></script>

<script>
  // ── Referencias al DOM ──────────────────────────────────
  const fileInput    = document.getElementById('fileInput');
  const btnUpload    = document.getElementById('btnUpload');
  const fileInfo     = document.getElementById('fileInfo');
  const uploadStatus = document.getElementById('uploadStatus');
  const uploadZone   = document.getElementById('uploadZone');
  const cardCursos   = document.getElementById('cardCursos');
  const cursosLista  = document.getElementById('cursosLista');
  const courseSearch = document.getElementById('courseSearch');
  const clearSearch  = document.getElementById('clearSearch');

  // Almacena la carga horaria parseada y los cursos seleccionados
  // Equivale a carga_horaria = {} en app.py
  let cargaGlobal         = null;
  let cursosSeleccionados = new Set();

  // ── 1. Archivo seleccionado: muestra nombre y habilita botón ──
  fileInput.onchange = () => {
    if (fileInput.files.length > 0) {
      const name = fileInput.files[0].name;
      fileInfo.style.display = 'flex';
      fileInfo.innerHTML     = '📄 ' + name;
      uploadZone.classList.add('active');
      btnUpload.disabled = false;
    }
  };

  // ── 2. Cargar archivo: llama a parsearExcel() de parser.js ──
  // Antes hacía fetch('/upload') al servidor Flask.
  // Ahora parsearExcel() lee el archivo directo en el navegador.
  btnUpload.onclick = () => {
    if (!fileInput.files.length) return;

    const file     = fileInput.files[0];
    btnUpload.disabled = true;
    fileInfo.style.display = 'flex';
    fileInfo.innerHTML     = '⏳ Cargando: ' + file.name;
    uploadStatus.innerHTML = '<span class="spinner"></span> Procesando archivo...';

    // parsearExcel devuelve una Promise (igual que una petición al servidor)
    parsearExcel(file)
      .then(carga => {
        cargaGlobal = carga;

        // Guarda la carga en sessionStorage para que generador.html la use
        // Equivale a carga_horaria = {} en memoria del servidor Flask
        sessionStorage.setItem('cargaHoraria', JSON.stringify(carga));

        const cursos = Object.keys(carga).sort();
        uploadStatus.innerHTML =
          `<span style="color:#10b981">✅ ¡Éxito! ${cursos.length} cursos cargados.</span>`;

        // Construye la lista de cursos — equivale al {% for %} de Jinja
        construirListaCursos(cursos);
        cardCursos.style.display = 'block';
      })
      .catch(err => {
        uploadStatus.innerHTML =
          `<span style="color:#ef4444">❌ ${err}</span>`;
        btnUpload.disabled = false;
      });
  };

  // ── 3. Construir lista de cursos dinámicamente ──────────
  // Equivale al {% for nombre in cursos_nombres %} de Jinja
  function construirListaCursos(cursos) {
    cursosLista.innerHTML = '';
    cursos.forEach(nombre => {
      const div = document.createElement('div');
      div.className = 'curso-item';
      div.innerHTML = `
        <span class="curso-nombre">${nombre}</span>
        <span class="curso-check">✔</span>
      `;
      div.onclick = () => toggleCursoSeleccionado(div, nombre);
      cursosLista.appendChild(div);
    });
  }

  // ── 4. Buscador: filtrar cursos por nombre ──────────────
  courseSearch.addEventListener('input', e => {
    const q = e.target.value.toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
    clearSearch.style.display = q.length > 0 ? 'block' : 'none';
    document.querySelectorAll('.curso-item').forEach(item => {
      const texto = item.querySelector('.curso-nombre').innerText.toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '');
      item.style.display = texto.includes(q) ? 'flex' : 'none';
    });
  });

  clearSearch.onclick = () => {
    courseSearch.value = '';
    clearSearch.style.display = 'none';
    document.querySelectorAll('.curso-item').forEach(item => {
      item.style.display = 'flex';
    });
    courseSearch.focus();
  };

  // ── 5. Selección de cursos: toggle ✔ y contador ─────────
  function toggleCursoSeleccionado(elemento, nombre) {
    const checkIcon        = elemento.querySelector('.curso-check');
    const estaSeleccionado = elemento.classList.toggle('seleccionado');

    if (estaSeleccionado) {
      checkIcon.style.display = 'inline';
      cursosSeleccionados.add(nombre);
    } else {
      checkIcon.style.display = 'none';
      cursosSeleccionados.delete(nombre);
    }

    document.getElementById('selCount').innerText = cursosSeleccionados.size;
    document.getElementById('btnNext').disabled   = cursosSeleccionados.size === 0;
  }

  // ── 6. Ir al generador ──────────────────────────────────
  // Antes era window.location.href = '/generador?curso=...'
  // Ahora pasa los cursos por URL igual, generador.html los lee
  document.getElementById('btnNext').onclick = () => {
    if (!cursosSeleccionados.size) return;
    const params = new URLSearchParams();
    cursosSeleccionados.forEach(c => params.append('curso', c));
    window.location.href = 'generador.html?' + params.toString();
  };
</script>

</body>
</html>
